    subtitle: "Real-Time Food Sharing & Community Support"
    description: "Food Connection gives coordinators insight into how food resources flow through the community. Donors can share surplus food availability, while those in need can request support through simple prompts, helping identify food security trends early. Through iterative Design-Based Research cycles with food pantry staff and community members, the platform evolved to prioritize dignity and privacy while delivering actionable insights. Coordinators can then connect donors with recipients, organize food distribution, and reduce waste. The system uses machine learning to detect patterns in food availability and needs while maintaining complete anonymity, ensuring all users feel respected and supported."
