# Food Connection Capstone Infographic
Title: "Food Connection Capstone"
Description: "A Design-Based Research (DBR) capstone project addressing food security and community connection through real-time food sharing insights. This full-stack platform uses JavaScript, Python, and Flask to enable anonymous food availability check-ins, identify surplus and need trends, and help coordinators connect food donors with community members."

