    subtitle: "Empowering Student Leaders Through Effective Club Management"
    description: "HawkHub is a comprehensive club management platform designed to help student leaders organize, manage, and grow their clubs. Through iterative design research with student officers and club advisors, the system was built to address pain points in club coordination including scattered information, difficulty tracking engagement, and challenges maintaining member communication. The platform consolidates member management, event scheduling, attendance tracking, and leadership development in one accessible interface. Key features enable automatic notifications, attendance analytics, and role-based access control to support transparent leadership development."
