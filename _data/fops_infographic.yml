title: "Friends of Poway Seniors — Website Refurbishment"
description: "Modernizing a community senior support organization's web presence with simplified navigation, clearer communication, and a dedicated meal tracker — while preserving their mission of serving Poway's elderly population."

topics:
  - title: "Friends of Poway Seniors"
    image: "capstone/fops_logo.png"
    link: "/plans/friendsofpowayseniors/"
    alt: "Friends of Poway Seniors — Website Improvements Capstone"
    keyPoints:
      - "Simplify navigation — reduce dropdown clutter from 7+ options to 3 clear links"
      - "Remove unnecessary top-level items like Business Directory"
      - "Add prominent CTA buttons (Donate, Volunteer, Get Help) above the fold"
      - "Clean up layout with consistent spacing and logical visual hierarchy"
      - "Replace placeholder images with real event photography"
      - "Surface contact info, hours, and location in a prominent banner"
      - "Introduce meal tracker for seniors to log daily nutrition"
      - "Mobile-responsive design for elderly users and caregivers"
    subtitle: "Making Senior Support Accessible Online"
    description: "A design-based research capstone that rebuilds the Friends of Poway Seniors web presence with clarity and compassion. The organization provides essential services to Poway's elderly community — meal deliveries, social connections, transportation assistance, and wellness checks — but its current site buries this mission under cluttered navigation and unstructured layouts. This project delivers a clean, intuitive interface that makes the organization's purpose immediately clear, gives seniors and their families easy access to services, and introduces a novel meal tracking feature to help elderly users monitor their nutrition with support from caregivers."
    tech:
      - "Simplified Navigation Architecture"
      - "Mobile-First Responsive Design"
      - "Meal Tracker Dashboard"
      - "Prominent CTA Integration"
      - "Contact Information Banner"
      - "Real Photography Integration"
      - "Accessible UI Components"
    impact:
      - "Reduces cognitive load for elderly users through simplified menus"
      - "Makes donation and volunteer opportunities impossible to miss"
      - "Builds trust through authentic photography of real community impact"
      - "Helps seniors and caregivers track daily nutrition with meal logger"
      - "Ensures critical contact info is always visible and accessible"
      - "Preserves the organization's mission while modernizing its presentation"
      - "Sets a foundation for future digital services (event RSVP, meal scheduling)"
    status: "In Planning"
