# ClubPulse Capstone Infographic
Title: "ClubPulse Capstone"
Description: "A Design-Based Research (DBR) capstone project addressing youth wellbeing through real-time emotional insights. This full-stack platform uses JavaScript, Python, and Flask to enable anonymous mood check-ins, identify wellbeing trends, and help staff provide targeted support for club members."

