    description: "ClubPulse gives staff insight into how members are doing emotionally. Students can check in with simple prompts, helping identify trends early. Through iterative Design-Based Research cycles with Boys & Girls Club staff and youth, the platform evolved to prioritize privacy while delivering actionable insights. Staff can then provide targeted support programs like tutoring, mentoring, or mental wellness activities. The system uses machine learning to detect patterns in wellbeing data while maintaining complete anonymity, ensuring youth feel safe sharing their emotions."
