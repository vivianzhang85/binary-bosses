# Ocean Cleanup Capstone Infographic
Title: "Ocean Cleanup Capstone"
Description: "A Design-Based Research (DBR) capstone project addressing marine plastic pollution through innovative technology. This full-stack platform uses JavaScript, Python, and Flask to coordinate cleanup efforts, track waste collection, and connect volunteers with cleanup events—restoring ocean health while protecting marine ecosystems."

